<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 「ひと夏の一日」アプリアイコン：夏休みの空気＝入道雲・夏の陽・田舎の丘・主人公の麦わら帽子（コード描画・外部素材なし） -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fc3e8"/>
      <stop offset="0.55" stop-color="#bfdcec"/>
      <stop offset="1" stop-color="#eef0db"/>
    </linearGradient>
    <linearGradient id="straw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0cd86"/>
      <stop offset="1" stop-color="#e0b766"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe6ea"/>
    </linearGradient>
  </defs>
  <!-- 夏空 -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- 夏の陽 -->
  <circle cx="116" cy="132" r="58" fill="#ffe49a"/>
  <!-- 入道雲（もくもくと立ちのぼる夏の雲＝夏休みの空気） -->
  <g fill="url(#cloud)">
    <ellipse cx="332" cy="120" rx="58" ry="58"/>
    <ellipse cx="300" cy="168" rx="62" ry="56"/>
    <ellipse cx="382" cy="158" rx="66" ry="60"/>
    <ellipse cx="346" cy="206" rx="86" ry="58"/>
    <ellipse cx="262" cy="206" rx="46" ry="40"/>
    <ellipse cx="428" cy="206" rx="40" ry="36"/>
    <rect x="232" y="210" width="220" height="44" rx="22"/>
  </g>
  <!-- 奥の丘 -->
  <path d="M0,344 Q150,296 300,332 T512,318 L512,512 L0,512 Z" fill="#a0c277"/>
  <!-- 手前の丘 -->
  <path d="M0,408 Q170,360 332,398 T512,388 L512,512 L0,512 Z" fill="#77a052"/>
  <!-- 麦わら帽子（主人公の帽子＝この物語の目印。丘の上にちょこんと） -->
  <g>
    <ellipse cx="256" cy="392" rx="120" ry="34" fill="url(#straw)"/>
    <path d="M188,400 Q256,372 324,400 L324,410 Q256,430 188,410 Z" fill="#5e7ea0"/>
    <ellipse cx="256" cy="372" rx="62" ry="40" fill="url(#straw)"/>
    <path d="M150,392 Q256,440 362,392 Q256,416 150,392 Z" fill="#d2a554"/>
    <ellipse cx="234" cy="358" rx="26" ry="13" fill="#f6dca6" opacity="0.7"/>
  </g>
</svg>
