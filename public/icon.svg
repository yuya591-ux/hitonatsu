<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 「ひと夏のまち」アプリアイコン v2（2026-07-07・本気版）：夏の夕暮れの帰り道＝燃える夕焼け空・低い夕陽・入道雲の影絵・電柱と電線とツバメ・虫取り網をかついで家路につく子の後ろ姿と長い影。ゲームで最も愛されている「夕方」の空気をそのまま一枚に。コード描画・外部素材なし。maskable対応＝主要モチーフは中央80%内 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f3f6e"/>
      <stop offset="0.30" stop-color="#7a5280"/>
      <stop offset="0.55" stop-color="#c9667a"/>
      <stop offset="0.74" stop-color="#ef8f52"/>
      <stop offset="0.88" stop-color="#ffc06a"/>
      <stop offset="1" stop-color="#ffdf96"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c8" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#ffcf7d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffb060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8955e"/>
      <stop offset="0.5" stop-color="#b06055"/>
      <stop offset="1" stop-color="#7c4450"/>
    </linearGradient>
    <linearGradient id="cloudDusk" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8a4e62"/>
      <stop offset="1" stop-color="#5f4470"/>
    </linearGradient>
  </defs>

  <!-- 燃える夕空 -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- 夕陽のにじみ（大きな光のかたまり） -->
  <circle cx="216" cy="380" r="200" fill="url(#sunGlow)"/>
  <!-- 低い夕陽（地平に沈みかけ） -->
  <circle cx="216" cy="372" r="56" fill="#ffedb6"/>
  <circle cx="216" cy="372" r="44" fill="#fff8dc"/>

  <!-- 入道雲の影絵（左＝昼の名残の塔・夕陽側の縁だけ焼ける） -->
  <g fill="url(#cloudDusk)">
    <ellipse cx="96" cy="150" rx="54" ry="48"/>
    <ellipse cx="140" cy="192" rx="58" ry="46"/>
    <ellipse cx="72" cy="208" rx="44" ry="38"/>
    <ellipse cx="106" cy="238" rx="72" ry="40"/>
  </g>
  <!-- 右上のちぎれ雲（夕色に染まる） -->
  <g fill="#8a5570" opacity="0.9">
    <ellipse cx="420" cy="96" rx="46" ry="14"/>
    <ellipse cx="452" cy="120" rx="30" ry="10"/>
  </g>

  <!-- 遠い町なみの影絵（帰る家々の灯） -->
  <g fill="#5c3852">
    <rect x="0" y="352" width="512" height="30"/>
    <rect x="20" y="336" width="34" height="22"/>
    <path d="M16,338 L37,322 L58,338 Z"/>
    <rect x="88" y="330" width="40" height="28"/>
    <path d="M84,332 L108,314 L132,332 Z"/>
    <rect x="368" y="334" width="36" height="24"/>
    <path d="M364,336 L386,320 L408,336 Z"/>
    <rect x="446" y="340" width="40" height="20"/>
    <path d="M442,342 L466,326 L490,342 Z"/>
  </g>
  <!-- 窓の灯（夕餉のあかり＝ぽつぽつと温かく） -->
  <g fill="#ffd98a">
    <rect x="30" y="342" width="7" height="8" rx="1"/>
    <rect x="98" y="338" width="8" height="9" rx="1"/>
    <rect x="114" y="338" width="8" height="9" rx="1"/>
    <rect x="378" y="342" width="7" height="8" rx="1"/>
    <rect x="456" y="346" width="7" height="7" rx="1"/>
  </g>

  <!-- 地面（夕陽に染まる土手の帯） -->
  <rect x="0" y="380" width="512" height="132" fill="#6e3e50"/>
  <!-- 夕陽へまっすぐ帰る道（一本道の遠近＝物語の中心線） -->
  <path d="M196,512 L240,382 L272,382 L316,512 Z" fill="url(#road)"/>

  <!-- 電柱と電線（右・2000年の夏の夕方の定番の影絵） -->
  <g stroke="#3a2438" stroke-linecap="round">
    <line x1="396" y1="180" x2="396" y2="420" stroke-width="11"/>
    <line x1="362" y1="212" x2="430" y2="212" stroke-width="8"/>
    <line x1="370" y1="238" x2="422" y2="238" stroke-width="6"/>
  </g>
  <g fill="#3a2438">
    <rect x="366" y="202" width="7" height="10" rx="2"/>
    <rect x="392" y="202" width="7" height="10" rx="2"/>
    <rect x="418" y="202" width="7" height="10" rx="2"/>
  </g>
  <g stroke="#3a2438" stroke-width="3" fill="none" opacity="0.9">
    <path d="M369,214 Q250,248 0,232"/>
    <path d="M421,214 Q480,222 512,220"/>
    <path d="M373,240 Q250,268 0,256"/>
  </g>
  <!-- 電線にとまるツバメ（3羽＝そろそろ帰る時間） -->
  <g fill="#2c1b30">
    <path d="M300,236 q4,-9 9,0 l-2,7 l6,7 l-8,-4 l-8,4 l6,-7 Z"/>
    <path d="M254,244 q4,-9 9,0 l-2,7 l6,7 l-8,-4 l-8,4 l6,-7 Z"/>
    <path d="M180,246 q4,-9 9,0 l-2,7 l6,7 l-8,-4 l-8,4 l6,-7 Z"/>
  </g>
  <!-- 赤とんぼ（夕空のアクセント・2匹） -->
  <g stroke="#d9564a" stroke-width="3" stroke-linecap="round">
    <line x1="118" y1="300" x2="140" y2="296"/>
    <line x1="124" y1="290" x2="126" y2="304"/>
    <line x1="133" y1="289" x2="135" y2="303"/>
  </g>
  <g stroke="#d9564a" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
    <line x1="360" y1="132" x2="378" y2="129"/>
    <line x1="365" y1="124" x2="366" y2="136"/>
    <line x1="372" y1="123" x2="373" y2="135"/>
  </g>

  <!-- 家路の子（後ろ姿の影絵＝チビ頭身・麦わら帽子・虫取り網を肩に）と長い影 -->
  <ellipse cx="268" cy="470" rx="64" ry="11" fill="#3a2038" opacity="0.5"/>
  <g fill="#33203c">
    <!-- 脚（右足を一歩まえに＝家路の歩み） -->
    <rect x="250" y="424" width="12" height="38" rx="5"/>
    <rect x="268" y="420" width="12" height="34" rx="5"/>
    <!-- 胴（小さな体・すこし台形） -->
    <path d="M246,376 Q265,366 284,376 L281,428 L249,428 Z"/>
    <!-- 左腕（ぶらり） -->
    <path d="M246,382 Q236,404 240,418 L248,416 Q246,400 252,388 Z"/>
    <!-- 右腕（網の柄をにぎる） -->
    <path d="M282,384 L300,372 L305,380 L288,392 Z"/>
    <!-- 頭（頭身大きめ＝この作品の子ども） -->
    <circle cx="265" cy="350" r="21"/>
  </g>
  <!-- 麦わら帽子（影絵の中で唯一色を残す＝この子の目印） -->
  <ellipse cx="265" cy="345" rx="34" ry="10" fill="#e8b866"/>
  <path d="M245,343 Q265,323 285,343 L285,348 Q265,356 245,348 Z" fill="#f0c876"/>
  <!-- 虫取り網（肩にかつぐ＝輪は頭から離して右上の空へ） -->
  <g>
    <line x1="300" y1="376" x2="342" y2="312" stroke="#4a3040" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="352" cy="296" rx="18" ry="24" fill="none" stroke="#4a3040" stroke-width="5" transform="rotate(32 352 296)"/>
    <path d="M342,310 Q354,326 366,308" fill="none" stroke="#4a3040" stroke-width="2.4" opacity="0.8"/>
  </g>
</svg>
