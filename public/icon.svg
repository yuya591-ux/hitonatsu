<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 「ひと夏の一日」アプリアイコン：夏空の田舎＋主人公の麦わら帽子（コード描画・外部素材なし） -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcd9ea"/>
      <stop offset="0.62" stop-color="#dfeadd"/>
      <stop offset="1" stop-color="#f2e9cf"/>
    </linearGradient>
    <linearGradient id="straw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0cd86"/>
      <stop offset="1" stop-color="#e3bb6c"/>
    </linearGradient>
  </defs>
  <!-- 夏空 -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- やわらかな夏の太陽 -->
  <circle cx="150" cy="146" r="60" fill="#ffe6a0"/>
  <!-- 入道雲のひとひら -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="392" cy="150" rx="58" ry="34"/>
    <ellipse cx="350" cy="166" rx="40" ry="26"/>
    <ellipse cx="430" cy="168" rx="38" ry="24"/>
  </g>
  <!-- 奥の丘 -->
  <path d="M0,356 Q150,300 300,342 T512,326 L512,512 L0,512 Z" fill="#9cc074"/>
  <!-- 手前の丘 -->
  <path d="M0,424 Q180,378 332,412 T512,402 L512,512 L0,512 Z" fill="#79a455"/>
  <!-- 麦わら帽子（主人公の帽子。平たいボーター＋青いリボン） -->
  <g>
    <!-- クラウン（平たいドーム） -->
    <ellipse cx="256" cy="262" rx="96" ry="60" fill="url(#straw)"/>
    <!-- 青いリボン -->
    <path d="M160,292 Q256,316 352,292 L352,308 Q256,334 160,308 Z" fill="#5e7ea0"/>
    <!-- つば -->
    <ellipse cx="256" cy="312" rx="178" ry="52" fill="url(#straw)"/>
    <!-- つばのふち（やや濃い麦わら＝立体感） -->
    <path d="M82,312 Q256,372 430,312 Q256,344 82,312 Z" fill="#d3a655"/>
    <!-- 麦わらの編み目（つばの点線） -->
    <ellipse cx="256" cy="312" rx="150" ry="42" fill="none" stroke="#cb9f52" stroke-width="4" stroke-dasharray="3 13" opacity="0.7"/>
    <!-- クラウンのハイライト -->
    <ellipse cx="232" cy="240" rx="40" ry="20" fill="#f6dca6" opacity="0.7"/>
  </g>
</svg>
