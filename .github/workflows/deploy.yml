# main ブランチへの push をきっかけに、Vite でビルドして GitHub Pages へ公開する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能にしておく

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 公開は同時に1つだけ進める（古い実行はキャンセルしない＝公開済みを優先）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
