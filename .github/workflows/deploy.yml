# main ブランチへの push をきっかけに、Vite でビルドして GitHub Pages へ公開する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能にしておく

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 公開は同時に1つだけ進める（古い実行はキャンセルしない＝公開済みを優先）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      # J6：公開前ゲート。ビルド＋ヘッドレス検証（npm run verify）が通った時だけ成果物を上げる。
      # 失敗するとここでジョブが止まり、artifact が作られず、deploy（needs: build）も走らない＝壊れたまま公開しない。
      # ブラウザは ubuntu-latest 同梱の Google Chrome を使う（外部アクション不使用）。
      - name: Chrome のパスを解決
        id: chrome
        run: |
          P="$(which google-chrome || which google-chrome-stable || which chromium-browser || which chromium || true)"
          if [ -z "$P" ]; then echo "Chrome が見つからず検証できません" >&2; exit 1; fi
          echo "ランナーのChrome: $P"
          echo "path=$P" >> "$GITHUB_OUTPUT"
      - name: ビルド＋検証（公開前ゲート）
        run: npm run verify
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.path }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # Pages バックエンドがまれに「Deployment failed, try again later」で固着する（2026-07-04 / 07-06）。
      # 最大3回・待ちを延ばしながら試す。全部ダメでも「失敗」にせず警告のみ＝購読者に失敗メールを飛ばさない。
      # コードの正しさは build ジョブ（公開前ゲート）が担保済み・deploy失敗はPages基盤側の一過性。
      # 実反映は毎回 本番JSハッシュで人手確認する運用（CLAUDE.md §7）＝サイレント未公開は人が捕まえる。
      - id: d1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: 固着1→30秒待って再試行
        if: steps.d1.outcome != 'success'
        run: sleep 30
      - id: d2
        if: steps.d1.outcome != 'success'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: 固着2→90秒待って再試行
        if: steps.d1.outcome != 'success' && steps.d2.outcome != 'success'
        run: sleep 90
      - id: d3
        if: steps.d1.outcome != 'success' && steps.d2.outcome != 'success'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: 結果（全滅でも失敗にせず警告のみ＝失敗メールを飛ばさない）
        run: |
          if [ "${{ steps.d1.outcome }}" = "success" ] || [ "${{ steps.d2.outcome }}" = "success" ] || [ "${{ steps.d3.outcome }}" = "success" ]; then
            echo "Pages 公開 OK"
          else
            echo "::warning::Pages基盤の固着で3回とも公開に失敗。コードは検証済み・本番ハッシュは未更新のはず。手動復旧: gh api --method PUT repos/OWNER/REPO/pages -f build_type=workflow から gh run rerun <id> --failed（または少し後に再push）"
          fi
