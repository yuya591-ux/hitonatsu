# main ブランチへの push をきっかけに、Vite でビルドして GitHub Pages へ公開する
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能にしておく

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 公開は同時に1つだけ進める（古い実行はキャンセルしない＝公開済みを優先）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      # J6：公開前ゲート。ビルド＋ヘッドレス検証（npm run verify）が通った時だけ成果物を上げる。
      # 失敗するとここでジョブが止まり、artifact が作られず、deploy（needs: build）も走らない＝壊れたまま公開しない。
      # ブラウザは ubuntu-latest 同梱の Google Chrome を使う（外部アクション不使用）。
      - name: Chrome のパスを解決
        id: chrome
        run: |
          P="$(which google-chrome || which google-chrome-stable || which chromium-browser || which chromium || true)"
          if [ -z "$P" ]; then echo "Chrome が見つからず検証できません" >&2; exit 1; fi
          echo "ランナーのChrome: $P"
          echo "path=$P" >> "$GITHUB_OUTPUT"
      - name: ビルド＋検証（公開前ゲート）
        run: npm run verify
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.path }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
