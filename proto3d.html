<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ひと夏の一日 ― 3D試作</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1b1d24; overflow: hidden;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        color: #3b3024; -webkit-tap-highlight-color: transparent; user-select: none; }
      #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
      .hud { position: fixed; }
      #hint { left: 50%; top: 3.5%; transform: translateX(-50%);
        padding: 0.4em 1.2em; font-size: clamp(13px,2.4vw,18px); letter-spacing: 0.08em;
        color: #4a4032; background: rgba(255,251,243,0.9); border-radius: 999px;
        box-shadow: 0 2px 10px rgba(90,78,56,0.22); }
      #act { left: 50%; bottom: 9%; transform: translateX(-50%); appearance: none; border: none;
        cursor: pointer; padding: 0.6em 1.8em; font-size: clamp(15px,3vw,22px); font-family: inherit;
        color: #4a4032; background: rgba(255,250,240,0.94); border-radius: 999px;
        box-shadow: 0 4px 14px rgba(120,100,70,0.3); display: none; }
      #badge { right: 3%; top: 3.5%; padding: 0.3em 0.8em; font-size: clamp(11px,2vw,14px);
        color: #fdf7ec; background: rgba(74,64,50,0.7); border-radius: 999px; }
      #look { left: 50%; bottom: 9%; transform: translateX(-50%); padding: 0.4em 1.1em;
        font-size: clamp(12px,2.2vw,16px); color: #fdf7ec; background: rgba(60,66,98,0.8);
        border-radius: 999px; display: none; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hint" class="hud">タップした所へ歩く ／ 高台のベンチへ</div>
    <div id="badge" class="hud">3D試作（低ポリ＋トゥーン）</div>
    <button id="act" class="hud">すわる</button>
    <div id="look" class="hud">スワイプで見回す ・ もう一度タップで立つ</div>
    <script type="module" src="/src/proto3d/main.js"></script>
  </body>
</html>
